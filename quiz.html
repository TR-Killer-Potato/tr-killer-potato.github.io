<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery Challenge - Quiz App</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --card-bg: #16213e;
            --border-color: #0f3460;
            --accent-blue: #3498db;
            --accent-green: #4ecca3;
            --error-red: #e94560;
            --text-dim: #95a5a6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #fff; }
        #quiz-container { background: var(--card-bg); padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 100%; max-width: 750px; text-align: center; border: 1px solid var(--border-color); margin: 20px; min-height: 400px; display: flex; flex-direction: column; justify-content: center; }
        
        .hidden { display: none !important; }

        /* Spinner */
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--accent-green); animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Landing Page */
        .header-title { color: var(--accent-green); margin-bottom: 0.5rem; font-size: 2.2rem; }
        .sub-text { color: var(--text-dim); margin-bottom: 2rem; }
        .lesson-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: 100%; }
        .lesson-btn { padding: 25px; background: var(--bg-dark); border: 2px solid var(--border-color); border-radius: 12px; color: #fff; cursor: pointer; transition: 0.3s; font-weight: bold; text-align: center; font-size: 1.2rem; }
        .lesson-btn:hover { border-color: var(--accent-blue); background: var(--border-color); transform: translateY(-3px); }

        /* Selection Screen */
        .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 2rem 0; }
        .style-btn { padding: 15px; background: var(--bg-dark); border: 2px solid var(--border-color); border-radius: 10px; color: var(--text-dim); cursor: pointer; transition: 0.2s; font-weight: 600; font-size: 0.9rem; }
        .style-btn.selected { border-color: var(--accent-blue); background: var(--border-color); color: #fff; box-shadow: 0 0 10px rgba(52, 152, 219, 0.3); }
        .action-btns { display: flex; gap: 12px; justify-content: center; margin-top: 1rem; }
        .back-btn { padding: 15px 25px; border-radius: 50px; border: 1px solid var(--text-dim); background: transparent; color: var(--text-dim); cursor: pointer; transition: 0.2s; }
        .back-btn:hover { color: #fff; border-color: #fff; }

        /* Quiz UI */
        .type-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-blue); margin-bottom: 0.8rem; font-weight: bold; }
        .word-display { font-size: 3.5rem; margin-bottom: 2.5rem; color: #fff; font-weight: bold; min-height: 6rem; display: flex; align-items: center; justify-content: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { padding: 22px 15px; font-size: 1.1rem; border: 2px solid var(--border-color); border-radius: 12px; background: var(--bg-dark); color: var(--accent-green); cursor: pointer; transition: 0.2s; font-weight: 600; outline: none; -webkit-tap-highlight-color: transparent; }
        
        /* Only apply hover configurations on devices that support hover pointers (Desktops) */
        @media (hover: hover) {
            .option-btn:hover:not(:disabled) { background: var(--border-color); border-color: var(--accent-green); }
        }
        
        /* Snappy active state responsive to touch releases on mobile */
        .option-btn:active:not(:disabled) { background: var(--border-color); border-color: var(--accent-green); }

        .option-btn.correct { background: #2ecc71 !important; border-color: #2ecc71 !important; color: white !important; }
        .option-btn.wrong { background: var(--error-red) !important; border-color: var(--error-red) !important; color: white !important; }
        
        .progress-bar { height: 6px; background: var(--border-color); border-radius: 3px; overflow: hidden; margin-bottom: 25px; }
        .progress-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: 0.4s; }
        #score-board { margin-top: 25px; font-size: 0.9rem; color: var(--text-dim); border-top: 1px solid var(--border-color); padding-top: 20px; }
        
        .final-results-wrap { max-height: 400px; overflow-y: auto; margin: 20px 0; border: 1px solid var(--border-color); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; color: #fff; font-size: 0.85rem; }
        th, td { border: 1px solid var(--border-color); padding: 12px; text-align: left; }
        th { background: var(--border-color); color: var(--accent-blue); position: sticky; top: 0; }
        .row-correct { color: #2ecc71; }
        .row-wrong { color: var(--error-red); }

        .start-btn { padding: 15px 45px; font-size: 1.2rem; background: var(--accent-green); color: var(--bg-dark); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .start-btn:disabled { background: #2c3e50; color: #7f8c8d; cursor: not-allowed; opacity: 0.5; }
        
        .error-msg { color: var(--error-red); background: rgba(233, 69, 96, 0.1); padding: 20px; border-radius: 12px; border: 1px solid var(--error-red); }

        /* Persistent Navigation */
        .persistent-nav { margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; }
        .menu-link { text-decoration: none; }
    </style>
</head>
<body>

<div id="quiz-container">
    <!-- Status (Loading/Error) -->
    <div id="status-view" class="hidden">
        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p id="loader-text">Loading...</p>
        </div>
        <div id="error-container" class="hidden">
            <div class="error-msg" id="error-text">An error occurred.</div>
            <button class="back-btn" style="margin-top: 20px" onclick="location.reload()">Retry</button>
        </div>
    </div>

    <!-- 1. Landing Page -->
    <div id="landing-page">
        <h1 class="header-title">Mastery Challenge</h1>
        <p class="sub-text">Select a practice module to begin.</p>
        <div id="lesson-list" class="lesson-grid"></div>
    </div>

    <!-- 2. Style Selection -->
    <div id="selection-screen" class="hidden">
        <h2 id="selected-lesson-title" style="color: var(--accent-blue);">Loading Title...</h2>
        <p class="sub-text">Choose your challenge types:</p>
        <div class="selection-grid">
            <button class="style-btn" data-type="Vocab-Reading">Vocabulary - Reading</button>
            <button class="style-btn" data-type="Vocab-Meaning">Vocabulary - Meaning</button>
            <button class="style-btn" data-type="Reading-Vocab">Reading - Vocabulary</button>
            <button class="style-btn" data-type="Reading-Meaning">Reading - Meaning</button>
            <button class="style-btn" data-type="Meaning-Vocab">Meaning - Vocabulary</button>
            <button class="style-btn" data-type="Meaning-Reading">Meaning - Reading</button>
        </div>
        <div class="action-btns">
            <button id="start-btn" class="start-btn" disabled>Start Session</button>
        </div>
    </div>

    <!-- 3. Quiz Gameplay -->
    <div id="quiz-ui" class="hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="type-label" id="q-type">TYPE</div>
        <div class="word-display" id="display-text">...</div>
        <div class="options-grid" id="options"></div>
        <div id="score-board">Progression: <span id="current-count">0</span> / <span id="total-q">0</span> | Mastery: <span id="score">0</span></div>
    </div>

    <!-- 4. Results Screen -->
    <div id="results-ui" class="hidden">
        <h2 style="color:var(--accent-blue)">Session Results</h2>
        <p id="results-meta" class="sub-text">Lesson ID: Title</p>
        <p id="results-score" style="font-size: 1.1rem; margin-bottom: 1.5rem;">Final Score: 0 / 0</p>
        <div class="final-results-wrap">
            <table>
                <thead><tr><th>Question</th><th>Pick</th><th>Answer</th></tr></thead>
                <tbody id="results-tbody"></tbody>
            </table>
        </div>
        <button class="start-btn" onclick="location.reload()" style="margin-top: 1.5rem;">Restart Quiz</button>
    </div>

    <!-- Global Footer -->
    <div class="persistent-nav">
        <a href="index.html" class="menu-link" id="global-menu-link">
            <button class="back-btn" style="font-size: 0.9rem; padding: 10px 25px;">Main Menu</button>
        </a>
    </div>
</div>

<script>
/**
 * QUIZ APP ENGINE CONFIG
 */
const MANIFEST_PATH = 'quizdata/manifest.json';
let currentLessonFullObject = null;
let currentLessonID = "";
let questions = [];
let score = 0;
let currentIdx = 0;
let sessionLogs = [];
let selectedStyles = new Set();

/**
 * UI State Controller
 */
function showState(stateId) {
    ['landing-page', 'selection-screen', 'quiz-ui', 'results-ui', 'status-view'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('hidden');
    });
    const activeEl = document.getElementById(stateId);
    if (activeEl) activeEl.classList.remove('hidden');

    // Manage the Main Menu button text and action state depending on page context
    const menuLink = document.getElementById('global-menu-link');
    const menuButton = menuLink ? menuLink.querySelector('button') : null;

    if (menuLink && menuButton) {
        if (stateId === 'selection-screen') {
            menuButton.innerText = '← Back';
            menuLink.href = '#';
            menuLink.onclick = (e) => {
                e.preventDefault();
                showState('landing-page');
            };
        } else if (stateId === 'quiz-ui') {
            menuButton.innerText = '← Back';
            menuLink.href = '#';
            menuLink.onclick = (e) => {
                e.preventDefault();
                showState('selection-screen');
            };
        } else {
            menuButton.innerText = 'Main Menu';
            menuLink.href = 'index.html';
            menuLink.onclick = null;
        }
    }
}

function showLoading(text) {
    showState('status-view');
    document.getElementById('loader').classList.remove('hidden');
    document.getElementById('error-container').classList.add('hidden');
    document.getElementById('loader-text').innerText = text;
}

function showError(msg) {
    showState('status-view');
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('error-container').classList.remove('hidden');
    document.getElementById('error-text').innerText = msg;
}

/**
 * Data Management
 */
async function loadRepository() {
    showLoading('Initializing repository...');
    try {
        const response = await fetch(MANIFEST_PATH);
        if (!response.ok) throw new Error('Manifest not found in quizdata/');
        const manifest = await response.json();
        renderSelector(manifest.lessons);
        showState('landing-page');
    } catch (err) {
        showError(`Init Error: ${err.message}`);
    }
}

async function loadLesson(lessonMeta) {
    showLoading(`Fetching ${lessonMeta.id}...`);
    try {
        const response = await fetch(lessonMeta.file);
        if (!response.ok) throw new Error(`Data file missing: ${lessonMeta.file}`);
        const fullData = await response.json();
        
        // Source of Truth: { title: "...", vocabulary: [...] }
        currentLessonFullObject = fullData;
        currentLessonID = lessonMeta.id;
        
        document.getElementById('selected-lesson-title').innerText = fullData.title || lessonMeta.id;
        showState('selection-screen');
    } catch (err) {
        showError(`Load Error: ${err.message}`);
    }
}

function renderSelector(lessons) {
    const grid = document.getElementById('lesson-list');
    grid.innerHTML = '';
    lessons.forEach(lesson => {
        const btn = document.createElement('button');
        btn.className = 'lesson-btn';
        btn.innerText = lesson.id;
        btn.onclick = () => loadLesson(lesson);
        grid.appendChild(btn);
    });
}

/**
 * Selection Screen Logic
 */
document.querySelectorAll('.style-btn').forEach(btn => {
    btn.onclick = () => {
        const type = btn.dataset.type;
        selectedStyles.has(type) ? selectedStyles.delete(type) : selectedStyles.add(type);
        btn.classList.toggle('selected');
        document.getElementById('start-btn').disabled = (selectedStyles.size === 0);
    };
});

document.getElementById('start-btn').onclick = () => {
    prepareQuestions();
    showState('quiz-ui');
    loadQuestion();
};

/**
 * Quiz Loop Logic
 */
function prepareQuestions() {
    questions = [];
    score = 0;
    currentIdx = 0;
    sessionLogs = [];
    
    const vocabulary = currentLessonFullObject.vocabulary || [];
    
    vocabulary.forEach(item => {
        // v = Vocab, r = Reading, m = Meaning
        // dv = Distractor Vocab, dr = Distractor Reading, dm = Distractor Meaning
        if (selectedStyles.has("Vocab-Meaning")) questions.push({ q: item.v, a: item.m, type: "Vocab-Meaning", dist: item.dm });
        if (selectedStyles.has("Meaning-Vocab")) questions.push({ q: item.m, a: item.v, type: "Meaning-Vocab", dist: item.dv });
        if (selectedStyles.has("Reading-Meaning")) questions.push({ q: item.r, a: item.m, type: "Reading-Meaning", dist: item.dm });
        if (selectedStyles.has("Meaning-Reading")) questions.push({ q: item.m, a: item.r, type: "Meaning-Reading", dist: item.dr });
        
        // Rule: Do NOT include vocabulary with redundant readings in Vocabulary-Reading or Reading-Vocabulary quizzes
        if (!item.isReadingRedundant) {
            if (selectedStyles.has("Vocab-Reading")) questions.push({ q: item.v, a: item.r, type: "Vocab-Reading", dist: item.dr });
            if (selectedStyles.has("Reading-Vocab")) questions.push({ q: item.r, a: item.v, type: "Reading-Vocab", dist: item.dv });
        }
    });

    questions.sort(() => Math.random() - 0.5);
}

function loadQuestion() {
    if (currentIdx >= questions.length) {
        showFinalResults();
        return;
    }
    
    // Safety Sweep 1: Remove active browser focus state immediately to prevent focus state transfers
    if (document.activeElement && typeof document.activeElement.blur === 'function') {
        document.activeElement.blur();
    }

    const q = questions[currentIdx];
    document.getElementById('q-type').innerText = q.type;
    document.getElementById('display-text').innerText = q.q;
    document.getElementById('total-q').innerText = questions.length;
    document.getElementById('score').innerText = score;
    document.getElementById('current-count').innerText = currentIdx + 1;
    document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
    
    const opts = [q.a, ...q.dist].sort(() => Math.random() - 0.5);
    
    // Safety Sweep 2 (Silver Bullet for WebKit): Reconstruct the parent grid itself. 
    // This purges all touch/tap-interaction associations the mobile OS is holding for this container space.
    const oldDiv = document.getElementById('options');
    const div = oldDiv.cloneNode(false);
    oldDiv.parentNode.replaceChild(div, oldDiv);
    
    opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerText = opt;
        btn.onclick = () => {
            btn.blur(); // Dismiss active/focused state immediately upon click
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            const isCorrect = (opt === q.a);
            sessionLogs.push({ type: q.type, word: q.q, response: opt, answer: q.a, correct: isCorrect });
            
            if (isCorrect) {
                score++; btn.classList.add('correct');
                setTimeout(() => { currentIdx++; loadQuestion(); }, 800);
            } else {
                btn.classList.add('wrong');
                document.querySelectorAll('.option-btn').forEach(b => {
                    if (b.innerText === q.a) b.classList.add('correct');
                });
                setTimeout(() => { currentIdx++; loadQuestion(); }, 3500);
            }
        };
        div.appendChild(btn);
    });
}

function showFinalResults() {
    let rows = sessionLogs.map(l => `
        <tr class="${l.correct ? 'row-correct' : 'row-wrong'}">
            <td>${l.type} (${l.word})</td>
            <td>${l.response}</td>
            <td>${l.answer}</td>
        </tr>`).join('');
        
    document.getElementById('results-meta').innerText = `${currentLessonID}: ${currentLessonFullObject.title}`;
    document.getElementById('results-score').innerText = `Final Score: ${score} / ${questions.length}`;
    document.getElementById('results-tbody').innerHTML = rows;
    
    showState('results-ui');
}

// Bootstrap
loadRepository();
</script>
</body>
</html>
