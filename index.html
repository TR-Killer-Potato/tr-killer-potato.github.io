<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery Challenge v4.0 - Multi-Lesson</title>
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --card-bg: #16213e;
            --border-color: #0f3460;
            --accent-blue: #3498db;
            --accent-green: #4ecca3;
            --error-red: #e94560;
            --text-dim: #95a5a6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-dark); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #fff; }
        #quiz-container { background: var(--card-bg); padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 100%; max-width: 750px; text-align: center; border: 1px solid var(--border-color); margin: 20px; }
        
        .hidden { display: none !important; }

        /* State 1: Landing Page */
        .header-title { color: var(--accent-green); margin-bottom: 0.5rem; }
        .sub-text { color: var(--text-dim); margin-bottom: 2rem; }
        .lesson-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 1rem; }
        .lesson-btn { padding: 20px; background: var(--bg-dark); border: 2px solid var(--border-color); border-radius: 12px; color: #fff; cursor: pointer; transition: 0.3s; font-weight: 600; text-align: left; }
        .lesson-btn:hover { border-color: var(--accent-blue); background: var(--border-color); transform: translateY(-3px); }
        .lesson-btn .lesson-id { display: block; color: var(--accent-blue); font-size: 0.8rem; margin-bottom: 5px; }

        /* State 2: Selection Screen */
        .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 2rem 0; }
        .style-btn { padding: 15px; background: var(--bg-dark); border: 2px solid var(--border-color); border-radius: 12px; color: var(--text-dim); cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 0.95rem; }
        .style-btn.selected { border-color: var(--accent-blue); background: var(--border-color); color: #fff; box-shadow: 0 0 10px rgba(52, 152, 219, 0.4); }
        .action-btns { display: flex; gap: 10px; justify-content: center; }
        .back-btn { padding: 15px 25px; border-radius: 50px; border: 1px solid var(--text-dim); background: transparent; color: var(--text-dim); cursor: pointer; }

        /* State 3: Quiz UI */
        .type-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-blue); margin-bottom: 0.5rem; font-weight: bold; }
        .word-display { font-size: 3.5rem; margin-bottom: 2rem; color: #fff; font-weight: bold; min-height: 6rem; display: flex; align-items: center; justify-content: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { padding: 20px 12px; font-size: 1.1rem; border: 2px solid var(--border-color); border-radius: 12px; background: var(--bg-dark); color: var(--accent-green); cursor: pointer; transition: 0.2s; font-weight: 600; }
        .option-btn:hover:not(:disabled) { background: var(--border-color); transform: translateY(-2px); border-color: var(--accent-green); }
        .option-btn.correct { background: #2ecc71 !important; border-color: #2ecc71 !important; color: white !important; }
        .option-btn.wrong { background: var(--error-red) !important; border-color: var(--error-red) !important; color: white !important; }
        
        .progress-bar { height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden; margin-bottom: 25px; }
        .progress-fill { height: 100%; background: var(--accent-blue); width: 0%; transition: 0.4s; }
        #score-board { margin-top: 25px; font-size: 1rem; color: var(--text-dim); border-top: 1px solid var(--border-color); padding-top: 20px; }
        
        .final-results-wrap { max-height: 400px; overflow-y: auto; margin: 20px 0; border: 1px solid var(--border-color); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; color: #fff; font-size: 0.85rem; }
        th, td { border: 1px solid var(--border-color); padding: 12px; text-align: left; }
        th { background: var(--border-color); color: var(--accent-blue); position: sticky; top: 0; }
        .row-correct { color: #2ecc71; }
        .row-wrong { color: var(--error-red); }

        .start-btn { padding: 15px 40px; font-size: 1.2rem; background: var(--accent-green); color: var(--bg-dark); border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .start-btn:disabled { background: #2c3e50; color: #7f8c8d; cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>

<div id="quiz-container">
    <!-- State 1: Landing Page -->
    <div id="landing-page">
        <h1 class="header-title">Mastery Challenge</h1>
        <p class="sub-text">Select a lesson to start your practice session.</p>
        <div id="lesson-list" class="lesson-grid"></div>
    </div>

    <!-- State 2: Selection Screen -->
    <div id="selection-screen" class="hidden">

        <p class="sub-text">Select the quiz styles you want to include:</p>

            <button class="style-btn" data-type="Meaning-Vocab">Meaning - Vocabulary</button>
            <button class="style-btn" data-type="Meaning-Reading">Meaning - Reading</button>
        </div>
        <div class="action-btns">
            <button class="back-btn" onclick="showState('landing-page')">← Back to Menu</button>
            <button id="start-btn" class="start-btn" disabled>Start Quiz</button>
        </div>
    </div>

    <!-- State 3: Quiz Engine UI -->
    <div id="quiz-ui" class="hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div class="type-label" id="q-type">TYPE</div>
        <div class="word-display" id="display-text">...</div>
        <div class="options-grid" id="options"></div>
        <div id="score-board">Progress: <span id="current-count">0</span> / <span id="total-q">0</span> | Score: <span id="score">0</span></div>
    </div>
</div>

{v: "お巡りさん", r: "おまわりさん", m: "Policeman", dv: ["お巡り参", "お廻りさん"], dr: ["おまわりざん", "おばんわりさん"], dm: ["Officer", "Patrolman"], isKat: false},

{v: "経済", r: "けいざい", m: "Economy", dv: ["経斉", "聖済"], dr: ["げいざい", "けいさい"], dm: ["Finance", "Business"], isKat: false},
{v: "ボランティア", r: "ボランティア", m: "Volunteer", dv: ["バランティア", "ボランディア"], dr: ["-", "-"], dm: ["Service", "Charity"], isKat: true},
{v: "締める", r: "しめる", m: "To tie/tighten", dv: ["諦める", "綿める"], dr: ["じめる", "しめる"], dm: ["To fasten", "To knot"], isKat: false},

{v: "歌舞伎", r: "かぶき", m: "Kabuki", dv: ["哥舞伎", "歌無伎"], dr: ["がぶき", "かふき"], dm: ["Drama", "Theater"], isKat: false}

    }
};

let activeLessonKey = null, questions = [], score = 0, currentIdx = 0, sessionLogs = [], selectedStyles = new Set();

/**
 * Navigation Utility
 */
function showState(stateId) {
    ['landing-page', 'selection-screen', 'quiz-ui'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(stateId).classList.remove('hidden');
}

/**
 * Create Buttons for Landing Page
 */
function initLandingPage() {
    const list = document.getElementById('lesson-list');
    list.innerHTML = '';
    Object.keys(quizLibrary).forEach(key => {
        const btn = document.createElement('button');
        btn.className = 'lesson-btn';
        btn.innerHTML = `<span class="lesson-id">${key}</span>${quizLibrary[key].title}`;
        btn.onclick = () => { 
            activeLessonKey = key; 
            document.getElementById('selected-lesson-title').innerText = quizLibrary[key].title; 
            showState('selection-screen'); 
        };
        list.appendChild(btn);
    });
}

/**
 * Handle Style Selection Toggles
 */
document.querySelectorAll('.style-btn').forEach(btn => {
    btn.onclick = () => {
        const type = btn.dataset.type;
        selectedStyles.has(type) ? selectedStyles.delete(type) : selectedStyles.add(type);
        btn.classList.toggle('selected');
        document.getElementById('start-btn').disabled = (selectedStyles.size === 0);
    };
});

/**
 * Start the Quiz
 */
document.getElementById('start-btn').onclick = () => {
    questions = []; score = 0; currentIdx = 0; sessionLogs = [];
    
    quizLibrary[activeLessonKey].data.forEach(item => {
        if (selectedStyles.has("Vocab-Meaning")) questions.push({ q: item.v, a: item.m, type: "Vocab-Meaning", dist: item.dm });
        if (selectedStyles.has("Meaning-Vocab")) questions.push({ q: item.m, a: item.v, type: "Meaning-Vocab", dist: item.dv });
        if (selectedStyles.has("Reading-Meaning")) questions.push({ q: item.r, a: item.m, type: "Reading-Meaning", dist: item.dm });
        if (selectedStyles.has("Meaning-Reading")) questions.push({ q: item.m, a: item.r, type: "Meaning-Reading", dist: item.dr });
        if (!item.isKat) {
            if (selectedStyles.has("Vocab-Reading")) questions.push({ q: item.v, a: item.r, type: "Vocab-Reading", dist: item.dr });
            if (selectedStyles.has("Reading-Vocab")) questions.push({ q: item.r, a: item.v, type: "Reading-Vocab", dist: item.dv });
        }
    });
    
    questions.sort(() => Math.random() - 0.5);
    showState('quiz-ui'); 
    loadQuestion();
};

/**
 * Quiz Loop
 */
function loadQuestion() {
    if (currentIdx >= questions.length) { showFinalResults(); return; }
    const q = questions[currentIdx];
    document.getElementById('q-type').innerText = q.type;
    document.getElementById('display-text').innerText = q.q;
    document.getElementById('total-q').innerText = questions.length;
    document.getElementById('score').innerText = score;
    document.getElementById('current-count').innerText = currentIdx + 1;
    document.getElementById('progress-fill').style.width = `${(currentIdx / questions.length) * 100}%`;
    
    const opts = [q.a, ...q.dist].sort(() => Math.random() - 0.5);
    const div = document.getElementById('options');
    div.innerHTML = '';
    
    opts.forEach(opt => {
        const b = document.createElement('button');
        b.className = 'option-btn'; b.innerText = opt;
        b.onclick = () => {
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
            const isCorrect = (opt === q.a);
            sessionLogs.push({ type: q.type, word: q.q, response: opt, answer: q.a, correct: isCorrect });
            
            if (isCorrect) { 
                score++; b.classList.add('correct'); 
                setTimeout(() => { currentIdx++; loadQuestion(); }, 800); 
            } else { 
                b.classList.add('wrong'); 
                document.querySelectorAll('.option-btn').forEach(btn => { 
                    if(btn.innerText === q.a) btn.classList.add('correct'); 
                }); 
                setTimeout(() => { currentIdx++; loadQuestion(); }, 3500); 
            }
        };
        div.appendChild(b);
    });
}

/**
 * Final Results Screen
 */
function showFinalResults() {
    let rows = sessionLogs.map(l => `
        <tr class="${l.correct ? 'row-correct' : 'row-wrong'}">
            <td>${l.type} (${l.word})</td>
            <td>${l.response}</td>
            <td>${l.answer}</td>
        </tr>`).join('');
        
    document.getElementById('quiz-ui').innerHTML = `
        <h2 style='color:var(--accent-blue)'>Session Complete</h2>
        <p>${activeLessonKey}: ${quizLibrary[activeLessonKey].title}</p>
        <p>Score: ${score} / ${questions.length}</p>
        <div class="final-results-wrap">
            <table>
                <thead><tr><th>Question</th><th>Your Pick</th><th>Answer</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
        <button class="start-btn" onclick="location.reload()">Return to Menu</button>
    `;
}

initLandingPage();
</script>
