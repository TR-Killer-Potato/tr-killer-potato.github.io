<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Vocabulary Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }
        .passage-text {
            line-height: 2.2;
            letter-spacing: 0.05em;
        }
        .target-vocab {
            cursor: pointer;
            border-bottom: 2px solid #3b82f6;
            transition: background-color 0.2s;
            padding: 0 2px;
            border-radius: 4px;
        }
        .target-vocab:hover {
            background-color: #dbeafe;
        }
        .vocab-tooltip {
            position: absolute;
            z-index: 50;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 12px 16px;
            pointer-events: auto;
            display: none;
            transform: translateY(-10px);
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(-10px); }
        }
        /* Loading Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <script>
        let currentPassage = null;
        let activeTooltip = null;
        let manifest = null;

        /**
         * Initialization: Fetch the manifest and load the first passage.
         */
        async function initApp() {
            try {
                // 1. Fetch the manifest list
                const response = await fetch('data/manifest.json');
                if (!response.ok) throw new Error('Could not load manifest');
                manifest = await response.json();
                
                renderSelector(manifest.passages);

                // 2. Load the first passage by default
                if (manifest.passages.length > 0) {
                    await loadPassage(manifest.passages[0]);
                }
            } catch (err) {
                document.getElementById('display-title').textContent = "Error loading data.";
                document.getElementById('passage-container').innerHTML = `<p class="text-red-500 text-lg">Make sure the 'data' folder and 'manifest.json' exist in the same directory.</p>`;
            }
            
            // Global click listener to close tooltip
            document.addEventListener('click', (e) => {
                if (activeTooltip && !e.target.closest('.target-vocab') && !e.target.closest('.vocab-tooltip')) {
                    hideTooltip();
                }
            });
        }

        function renderSelector(passages) {
            const selector = document.getElementById('passage-selector');
            selector.innerHTML = passages.map(p => 
                `<option value="${p.id}">${p.title}</option>`
            ).join('');
            
            selector.addEventListener('change', async (e) => {
                const selected = passages.find(p => p.id === e.target.value);
                await loadPassage(selected);
            });
        }

        /**
         * Fetches a specific JSON file based on selection.
         */
        async function loadPassage(passageMeta) {
            hideTooltip();
            const container = document.getElementById('passage-container');
            const titleEl = document.getElementById('display-title');
            
            titleEl.innerHTML = `<span class="loader mr-2"></span> Loading...`;
            container.innerHTML = "";

            try {
                const response = await fetch(`data/${passageMeta.file}`);
                if (!response.ok) throw new Error('File not found');
                currentPassage = await response.json();

                titleEl.textContent = currentPassage.title;
                
                // Process the content string
                let formattedText = currentPassage.content;
                Object.keys(currentPassage.vocabulary).forEach(word => {
                    const regex = new RegExp(`\\*\\*${word}\\*\\*`, 'g');
                    formattedText = formattedText.replace(regex, 
                        `<span class="target-vocab font-bold text-blue-700" onclick="handleVocabClick(event, '${word}')">${word}</span>`
                    );
                });

                container.innerHTML = formattedText;
            } catch (err) {
                titleEl.textContent = "Error";
                container.innerHTML = "Could not load the passage file.";
            }
        }

        function handleVocabClick(event, word) {
            event.stopPropagation();
            
            if (activeTooltip && activeTooltip.trigger === event.target) {
                hideTooltip();
                return;
            }

            const info = currentPassage.vocabulary[word];
            const rect = event.target.getBoundingClientRect();
            showTooltip(rect, info, event.target);
        }

        function showTooltip(rect, info, triggerElement) {
            const tooltip = document.getElementById('tooltip');
            const readingEl = document.getElementById('tooltip-reading');
            const meaningEl = document.getElementById('tooltip-meaning');

            readingEl.textContent = `[${info.reading}]`;
            meaningEl.textContent = info.meaning;

            tooltip.style.display = 'block';
            
            const scrollY = window.scrollY || window.pageYOffset;
            const tooltipWidth = tooltip.offsetWidth;
            const left = rect.left + (rect.width / 2) - (tooltipWidth / 2);
            const top = rect.top + scrollY - tooltip.offsetHeight;

            tooltip.style.left = `${Math.max(10, Math.min(left, window.innerWidth - tooltipWidth - 10))}px`;
            tooltip.style.top = `${top}px`;

            activeTooltip = { element: tooltip, trigger: triggerElement };
        }

        function hideTooltip() {
            const tooltip = document.getElementById('tooltip');
            tooltip.style.display = 'none';
            activeTooltip = null;
        }

        window.onload = initApp;
    </script>

    <div class="max-w-2xl mx-auto px-4 py-8 md:py-12">
        
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-slate-900 mb-6">Japanese Reader</h1>
            <div class="inline-block relative w-full max-w-xs">
                <label class="block text-sm font-medium text-slate-500 mb-2 text-left">Select Passage:</label>
                <select id="passage-selector" class="block appearance-none w-full bg-white border border-slate-200 text-slate-700 py-3 px-4 pr-8 rounded-xl leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent shadow-sm cursor-pointer">
                    <option>Loading passages...</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 pt-6 text-slate-700">
                    <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                </div>
            </div>
        </header>

        <main class="bg-white rounded-3xl shadow-xl p-8 md:p-12 border border-slate-100 relative">
            <h2 id="display-title" class="text-xl font-bold text-blue-600 mb-8 border-b border-slate-50 pb-4">Initializing...</h2>
            
            <article id="passage-container" class="passage-text text-2xl text-slate-800 leading-relaxed">
                <!-- Content injected by JS -->
            </article>
        </main>

        <footer class="mt-8 text-center text-slate-400 text-sm">
            Tap on <span class="font-bold text-blue-600">bolded words</span> to see their meaning.
        </footer>
    </div>

    <div id="tooltip" class="vocab-tooltip" onclick="hideTooltip()">
        <div class="flex flex-col items-center">
            <div id="tooltip-reading" class="text-2xl text-blue-600 font-bold mb-1"></div>
            <div id="tooltip-meaning" class="text-2xl text-slate-600 italic"></div>
            <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-r border-b border-slate-200 rotate-45"></div>
        </div>
    </div>

</body>
</html>
