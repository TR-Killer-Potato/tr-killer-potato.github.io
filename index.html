<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Reader App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --bg-slate: #f8fafc;
        }
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-slate);
            -webkit-tap-highlight-color: transparent;
        }
        .passage-container {
            line-height: 2.4;
            letter-spacing: 0.03em;
        }
        .target-vocab {
            color: var(--primary-blue);
            font-weight: 700;
            border-bottom: 2px solid #93c5fd;
            cursor: pointer;
            padding: 0 2px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .target-vocab:active {
            background-color: #dbeafe;
        }
        .vocab-tooltip {
            position: absolute;
            z-index: 100;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 1px solid #e2e8f0;
            display: none;
            flex-direction: column;
            align-items: center;
            min-width: 180px;
            pointer-events: auto;
            transform: translate(-50%, -100%);
            margin-top: -10px;
        }
        .vocab-tooltip::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px 8px 0 8px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        .animate-pop {
            animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            from { opacity: 0; transform: translate(-50%, -90%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -100%) scale(1); }
        }
    </style>
</head>
<body class="min-h-screen text-slate-900 pb-20">

    <div class="max-w-2xl mx-auto px-5 py-8 md:py-12">
        <header class="mb-8 text-center">
            <h1 class="text-sm font-semibold text-slate-500 uppercase tracking-widest mb-4">Japanese Reading Practice</h1>
            
            <div class="relative max-w-xs mx-auto">
                <select id="passage-selector" class="w-full bg-white border border-slate-200 rounded-2xl px-5 py-3 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm text-lg cursor-pointer">
                    <option value="">Loading passages...</option>
                </select>
                <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </header>

        <main id="app-content" class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-sm border border-slate-100 relative min-h-[300px]">
            <div id="loading-state" class="absolute inset-0 flex items-center justify-center bg-white rounded-[2.5rem] z-10" style="display: none;">
                <div class="flex flex-col items-center">
                    <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>

            <h2 id="passage-title" class="text-2xl font-bold text-slate-900 mb-8 pb-4 border-b border-slate-50"></h2>
            
            <article id="passage-body" class="passage-container text-2xl text-slate-800">
                <!-- Content will be injected here -->
            </article>
        </main>

        <footer class="mt-8 text-center text-slate-400 text-sm">
            Tap on <span class="text-blue-500 font-bold">blue underlined words</span> for readings.
        </footer>
    </div>

    <!-- Tooltip Element -->
    <div id="tooltip" class="vocab-tooltip" onclick="hideTooltip()">
        <div id="tooltip-reading" class="text-2xl font-bold text-blue-600 leading-tight"></div>
        <div id="tooltip-meaning" class="text-2xl text-slate-500 italic mt-1 text-center"></div>
    </div>

    <script>
        let manifestData = null;
        let currentPassageData = null;
        let activeWord = null;

        const elements = {
            selector: document.getElementById('passage-selector'),
            title: document.getElementById('passage-title'),
            body: document.getElementById('passage-body'),
            loader: document.getElementById('loading-state'),
            tooltip: document.getElementById('tooltip'),
            tReading: document.getElementById('tooltip-reading'),
            tMeaning: document.getElementById('tooltip-meaning')
        };

        /**
         * Main start function with Japanese filename support
         */
        async function startApp() {
            elements.loader.style.display = 'flex';
            try {
                // Fetch the manifest
                const response = await fetch('data/manifest.json');
                if (!response.ok) throw new Error(`Manifest not found (Status: ${response.status})`);
                manifestData = await response.json();

                // Fetch titles from each passage file
                const fetchPassages = manifestData.passages.map(async (p) => {
                    // CRITICAL: encodeURIComponent handles Japanese characters in the filename
                    const encodedFile = encodeURIComponent(p.file);
                    const res = await fetch(`data/${encodedFile}`);
                    if (!res.ok) {
                        console.error(`Failed to load file: data/${p.file}`);
                        return { id: p.id, file: p.file, title: `Error: ${p.file}` };
                    }
                    const data = await res.json();
                    return { id: p.id, file: p.file, title: data.title };
                });

                const passagesWithTitles = await Promise.all(fetchPassages);
                populateSelector(passagesWithTitles);

                // Load initial passage
                if (passagesWithTitles.length > 0) {
                    await loadPassage(passagesWithTitles[0].file);
                }
            } catch (err) {
                console.error(err);
                elements.body.innerHTML = `
                    <div class="text-red-500 p-4 bg-red-50 rounded-xl">
                        <p class="font-bold">Error Loading App</p>
                        <p class="text-sm mt-2">${err.message}</p>
                        <p class="text-xs mt-4 text-slate-500 italic">Check console for details. Ensure you are using a local server (like Live Server) or GitHub Pages.</p>
                    </div>`;
            } finally {
                elements.loader.style.display = 'none';
            }
        }

        function populateSelector(passages) {
            elements.selector.innerHTML = passages.map(p => 
                `<option value="${p.file}">${p.title}</option>`
            ).join('');

            elements.selector.addEventListener('change', (e) => {
                if (e.target.value) loadPassage(e.target.value);
            });
        }

        async function loadPassage(filename) {
            elements.loader.style.display = 'flex';
            hideTooltip();

            try {
                const encodedFile = encodeURIComponent(filename);
                const response = await fetch(`data/${encodedFile}`);
                if (!response.ok) throw new Error(`Passage file not found: ${filename}`);
                
                currentPassageData = await response.json();
                renderPassage();
            } catch (err) {
                elements.title.textContent = "Load Error";
                elements.body.textContent = `Could not load "${filename}". Check if the file exists in the /data folder.`;
                console.error(err);
            } finally {
                elements.loader.style.display = 'none';
            }
        }

        function renderPassage() {
            elements.title.textContent = currentPassageData.title;
            let html = currentPassageData.content;

            // Sort vocabulary by length descending to handle nested words properly
            const keys = Object.keys(currentPassageData.vocabulary).sort((a, b) => b.length - a.length);

            keys.forEach(word => {
                // Find **word** and replace with span
                const regex = new RegExp(`\\*\\*${word}\\*\\*`, 'g');
                html = html.replace(regex, 
                    `<span class="target-vocab" onclick="showTooltip(event, '${word}')">${word}</span>`
                );
            });

            elements.body.innerHTML = html;
        }

        function showTooltip(event, word) {
            event.stopPropagation();
            
            if (activeWord === word) {
                hideTooltip();
                return;
            }

            activeWord = word;
            const data = currentPassageData.vocabulary[word];
            const rect = event.target.getBoundingClientRect();

            elements.tReading.textContent = `[ ${data.reading} ]`;
            elements.tMeaning.textContent = data.meaning;

            elements.tooltip.style.display = 'flex';
            elements.tooltip.classList.remove('animate-pop');
            void elements.tooltip.offsetWidth; // Trigger reflow
            elements.tooltip.classList.add('animate-pop');

            const scrollY = window.scrollY || window.pageYOffset;
            let leftPos = rect.left + (rect.width / 2);
            
            // Boundary checks for screen edges
            const tooltipWidth = 200; // estimated
            if (leftPos < tooltipWidth/2) leftPos = tooltipWidth/2 + 10;
            if (leftPos > window.innerWidth - tooltipWidth/2) leftPos = window.innerWidth - tooltipWidth/2 - 10;

            elements.tooltip.style.left = `${leftPos}px`;
            elements.tooltip.style.top = `${rect.top + scrollY}px`;
        }

        function hideTooltip() {
            elements.tooltip.style.display = 'none';
            activeWord = null;
        }

        // Global listeners
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.target-vocab')) hideTooltip();
        });

        window.onload = startApp;
    </script>
</body>
</html>
